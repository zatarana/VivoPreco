name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Esta linha diz ao robô para entrar na sua pasta antes de começar
    defaults:
      run:
        working-directory: LifeFlowPro_Output

    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lifeflow-pro-debug
          # Caminho do arquivo dentro da sua pasta
          path: LifeFlowPro_Output/app/build/outputs/apk/debug/app-debug.apk
